name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v6

      - name: Python einrichten
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: PlatformIO installieren
        run: python -m pip install platformio==6.1.19

      - name: Lokale Beispielkonfiguration anlegen
        run: cp include/PoolConfig.example.h include/PoolConfig.h

      - name: ESP32-Firmware bauen
        run: pio run -e esp32-s3-panel

      - name: Hardwareunabhängige Tests ausführen
        run: pio test -e native

      - name: Mosquitto-Testbroker installieren
        run: |
          sudo apt-get update
          sudo apt-get install --yes mosquitto
          mosquitto -c .github/mosquitto-ci.conf -d

      - name: Python-Simulator mit MQTT-Broker prüfen
        run: python tools/loxone_mqtt_simulator.py --broker 127.0.0.1 --port 18884 --self-test
