name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v6

      - name: Python einrichten
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: PlatformIO installieren
        run: python -m pip install platformio==6.1.19

      - name: Lokale Beispielkonfiguration anlegen
        run: cp include/PoolConfig.example.h include/PoolConfig.h

      - name: ESP32-Firmware bauen
        run: pio run -e esp32-s3-panel

      - name: Hardwareunabhängige Tests ausführen
        run: pio test -e native

      - name: Python-Simulator prüfen
        run: python -m py_compile tools/loxone_mqtt_simulator.py
