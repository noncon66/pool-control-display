[platformio]
default_envs = esp32-s3-panel

[env:esp32-s3-panel]
platform = espressif32 @ 7.0.1
board = pool-control-display
framework = arduino

monitor_speed = 115200
upload_speed = 921600

build_flags =
    -Iinclude
    -DCORE_DEBUG_LEVEL=3
    -DLV_CONF_INCLUDE_SIMPLE

lib_ldf_mode = deep+

build_src_filter =
    +<*>
    -<display_bringup.cpp>
    -<touch_bringup.cpp>

# Disabled until the Waveshare ST7701/GT911 setup is ported and tested.
lib_ignore =
    Display

lib_deps =
    bblanchon/ArduinoJson @ ^7.0.4
    knolleary/PubSubClient @ ^2.8
    lvgl/lvgl @ 8.4.0

check_tool = cppcheck

# Native tests run on the development computer and need no ESP32 or display.
[env:native]
platform = native
test_framework = unity
build_flags =
    -Ilib/Pool
    -std=gnu++11

# Isolated hardware smoke test based on the official Waveshare 4B Arduino
# demo. It intentionally does not replace the normal firmware environment.
[env:esp32-s3-display-bringup]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.20/platform-espressif32.zip
board = pool-control-display
framework = arduino

monitor_speed = 115200
upload_speed = 921600

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1

build_src_filter =
    -<*>
    +<display_bringup.cpp>

lib_deps =
    moononournation/GFX Library for Arduino @ 1.6.0

# Isolated GT911 diagnostic. It scans the shared I2C bus and reports raw touch
# coordinates without initializing the RGB display, LVGL, Wi-Fi, or MQTT.
[env:esp32-s3-touch-bringup]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.20/platform-espressif32.zip
board = pool-control-display
framework = arduino

monitor_speed = 115200
upload_speed = 921600

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1

build_src_filter =
    -<*>
    +<touch_bringup.cpp>
