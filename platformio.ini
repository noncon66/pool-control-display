[env:esp32-s3-panel]
platform = espressif32
board = pool-control-display
framework = arduino

monitor_speed = 115200
upload_speed = 921600

build_flags =
    -Iinclude
    -DCORE_DEBUG_LEVEL=3

lib_ldf_mode = deep+

# Disabled until the exact panel revision and controller mapping are known.
lib_ignore =
    Display
    Gui

lib_deps =
    bblanchon/ArduinoJson @ ^7.0.4
    knolleary/PubSubClient @ ^2.8

check_tool = cppcheck
