[platformio]
default_envs = esp32-s3-panel

[env:esp32-s3-panel]
platform = espressif32
board = pool-control-display
framework = arduino

monitor_speed = 115200
upload_speed = 921600

build_flags =
    -Iinclude
    -DCORE_DEBUG_LEVEL=3
    -DLV_CONF_INCLUDE_SIMPLE

lib_ldf_mode = deep+

# Disabled until the exact panel revision and controller mapping are known.
lib_ignore =
    Display

lib_deps =
    bblanchon/ArduinoJson @ ^7.0.4
    knolleary/PubSubClient @ ^2.8
    lvgl/lvgl @ 8.4.0

check_tool = cppcheck

# Native tests run on the development computer and need no ESP32 or display.
[env:native]
platform = native
test_framework = unity
build_flags =
    -Ilib/Pool
    -std=gnu++11
