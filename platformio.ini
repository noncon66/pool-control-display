[platformio]
default_envs = esp32-s3-panel

[env:esp32-s3-panel]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.20/platform-espressif32.zip
board = pool-control-display
framework = arduino

monitor_speed = 115200
upload_speed = 921600

build_flags =
    -Iinclude
    # Arduino-ESP32 3.2.0 WiFi includes Network.h, but its library metadata
    # does not declare Networking as a dependency. Add the framework path via
    # PlatformIO's portable package directory instead of a local .pio path.
    -I$PROJECT_PACKAGES_DIR/framework-arduinoespressif32/libraries/Network/src
    -DCORE_DEBUG_LEVEL=3
    -DLV_CONF_INCLUDE_SIMPLE
    -DARDUINO_USB_CDC_ON_BOOT=1

lib_ldf_mode = deep+

build_src_filter =
    +<*>
    -<display_bringup.cpp>
    -<touch_bringup.cpp>

lib_deps =
    bblanchon/ArduinoJson @ ^7.0.4
    knolleary/PubSubClient @ ^2.8
    lvgl/lvgl @ 8.4.0
    moononournation/GFX Library for Arduino @ 1.6.0

check_tool = cppcheck

# Normal firmware with shortened inactivity thresholds for repeatable hardware
# verification. It is never selected by default and must be flashed explicitly.
[env:esp32-s3-power-test]
extends = env:esp32-s3-panel
build_flags =
    ${env:esp32-s3-panel.build_flags}
    -DSCREEN_POWER_DIM_AFTER_MS=5000UL
    -DSCREEN_POWER_OFF_AFTER_MS=30000UL

# Native tests run on the development computer and need no ESP32 or display.
[env:native]
platform = native
test_framework = unity
build_flags =
    -Ilib/Pool
    -std=gnu++11

# Isolated hardware smoke test based on the official Waveshare 4B Arduino
# demo. It intentionally does not replace the normal firmware environment.
[env:esp32-s3-display-bringup]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.20/platform-espressif32.zip
board = pool-control-display
framework = arduino

monitor_speed = 115200
upload_speed = 921600

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1

build_src_filter =
    -<*>
    +<display_bringup.cpp>

lib_deps =
    moononournation/GFX Library for Arduino @ 1.6.0

# Isolated GT911 diagnostic. It scans the shared I2C bus and reports raw touch
# coordinates without initializing the RGB display, LVGL, Wi-Fi, or MQTT.
[env:esp32-s3-touch-bringup]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.20/platform-espressif32.zip
board = pool-control-display
framework = arduino

monitor_speed = 115200
upload_speed = 921600

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1

build_src_filter =
    -<*>
    +<touch_bringup.cpp>
